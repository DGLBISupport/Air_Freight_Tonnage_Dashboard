services:
  - type: web
    name: tonnage-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ONPREM_API_URL
        value: https://survey.dartglobal.com/chatbot/v1.0/data
      - key: MAIL_AZURE_TENANT_ID
        sync: false
      - key: MAIL_AZURE_CLIENT_ID
        sync: false
      - key: MAIL_AZURE_CLIENT_SECRET
        sync: false
      - key: SENDER_EMAIL
        value: bi.support@dartglobal.com
