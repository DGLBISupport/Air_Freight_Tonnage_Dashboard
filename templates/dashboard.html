<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Tonnage Analysis</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 40px; 
            color: #333;
        }
        h1 { 
            color: #0f172a; 
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        .summary {
            margin-bottom: 20px;
            font-size: 14px;
            color: #64748b;
        }
        table { 
            border-collapse: collapse; 
            width: 100%; 
            font-size: 11px; 
            margin-top: 20px;
        }
        th, td { 
            border: 1px solid #cbd5e1; 
            padding: 8px; 
            text-align: left; 
        }
        th { 
            background-color: #f8fafc; 
            color: #0f172a;
            font-weight: 600;
        }
        tr:nth-child(even) {
            background-color: #f1f5f9;
        }
    </style>
</head>
<body>
    <h1>Weekly Tonnage Analysis - Turkish Airlines (Vietnam)</h1>
    <div class="summary">
        <p>Report generated for the period: June 1, 2025 to May 21, 2026</p>
    </div>
    
    {{ table_data | safe }}
    
</body>
</html>
